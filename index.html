<script>
  // Helper: shuffle options array and return new answer index
  function shuffleOptions(options, correctOriginalIndex) {
    const paired = options.map((opt, idx) => ({ opt, isCorrect: idx === correctOriginalIndex }));
    for (let i = paired.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [paired[i], paired[j]] = [paired[j], paired[i]];
    }
    const newOptions = paired.map(p => p.opt);
    const newAnswer = paired.findIndex(p => p.isCorrect);
    return { options: newOptions, answer: newAnswer };
  }

  // ------------------- TEST 1 (Deep Ocean) - already balanced, but we shuffle -------------------
  const test1Passage = `The deep ocean remains one of the least explored frontiers on our planet. While modern satellites have mapped the surface of Mars with stunning precision, more than eighty percent of Earth's oceans remain unmapped and unobserved. The immense hydrostatic pressure, crushing darkness, and freezing temperatures make the abyssal zone an incredibly hostile environment for human exploration. However, recent advancements in autonomous underwater vehicles (AUVs) have allowed scientists to bypass human limitations. These robotic submarines are equipped with high-resolution sonar and advanced sensory equipment, capable of descending thousands of meters to document previously unknown ecosystems. Hydrothermal vents, for instance, host unique biological communities that thrive on chemosynthesis rather than sunlight. As technology continues to evolve, these deep-sea expeditions are not merely satisfying scientific curiosity; they are uncovering invaluable resources and novel biochemical compounds that hold significant promise for future pharmaceutical breakthroughs.`;

  let test1Raw = [
    // Reading (5)
    { text: "Which statement best expresses the main idea of the passage?", options: ["Satellites map ocean floors best", "Drug needs drive ocean trips", "Tech enables deep sea study", "Deep life needs sunlight"], answer: 2, explanation: "Focus on AUVs overcoming harsh conditions.", skill: "Reading: Main Idea", difficulty: "medium", segment: "reading" },
    { text: "Based on the text, what can be reasonably inferred about human deep-sea divers?", options: ["They often visit hot vents", "They face grave limits in abyss", "They run AUVs by remote", "They mapped most oceans now"], answer: 1, explanation: "Pressure, darkness, freezing temps → extreme danger.", skill: "Reading: Inference", difficulty: "medium", segment: "reading" },
    { text: "Which detail best supports that AUVs are highly capable?", options: ["Work in freezing dark zones", "Have sonar and smart sensors", "Mapped Mars with high precision", "Find resources and compounds"], answer: 1, explanation: "Direct evidence of advanced equipment.", skill: "Reading: Evidence", difficulty: "easy", segment: "reading" },
    { text: "As used in the passage, 'hostile' most nearly means:", options: ["very welcoming", "unfavorable & risky", "quite mysterious", "extremely crowded"], answer: 1, explanation: "Hostile = dangerous/unfavorable.", skill: "Reading: Vocab in Context", difficulty: "easy", segment: "reading" },
    { text: "How does the author organize the information?", options: ["Challenge then tech fix", "Compare Earth to Mars", "List events in time order", "Focus on building costs"], answer: 0, explanation: "First challenge, then AUVs as solution.", skill: "Reading: Text Structure", difficulty: "medium", segment: "reading" },
    // Vocabulary (10)
    { text: "Because the city council lacked ______ over the neighboring county, they could not enforce the new zoning laws there.", options: ["Jurisdiction", "Deficiency", "Adolescent", "Prospect"], answer: 0, explanation: "Jurisdiction = legal authority.", skill: "Vocabulary: Sentence Completion", difficulty: "easy", segment: "vocab" },
    { text: "Which of the following is the best synonym for the word retort?", options: ["Complain", "Surrender", "Counter", "Question"], answer: 2, explanation: "Retort = sharp reply, counter.", skill: "Vocabulary: Synonym", difficulty: "easy", segment: "vocab" },
    { text: "What is the best antonym for the word solemn?", options: ["Serious", "Cheerful", "Anxious", "Dignified"], answer: 1, explanation: "Solemn = grave; opposite cheerful.", skill: "Vocabulary: Antonym", difficulty: "easy", segment: "vocab" },
    { text: "The mechanic noticed a slow dribble of oil leaking from the undercarriage. In this context, dribble means:", options: ["a fast heavy flow", "a steady wide stream", "a small trickle leak", "an explosive burst"], answer: 2, explanation: "Dribble = small trickle.", skill: "Vocabulary: Context", difficulty: "easy", segment: "vocab" },
    { text: "The word adolescent contains roots related to growing up. Which best defines an adolescent?", options: ["An elderly person", "A professional boss", "A youth becoming adult", "A helpless infant"], answer: 2, explanation: "Adolescent = teenager developing into adult.", skill: "Vocabulary: Root-Based", difficulty: "medium", segment: "vocab" },
    { text: "The farmer's crops suffered a severe nutrient ______, causing the leaves to turn yellow and the stems to wither.", options: ["Jurisdiction", "Deficiency", "Element", "Battery"], answer: 1, explanation: "Deficiency = lack.", skill: "Vocabulary: Sentence Completion", difficulty: "easy", segment: "vocab" },
    { text: "Which word is the closest synonym to furtively?", options: ["Openly", "Secretly", "Loudly", "Clumsily"], answer: 1, explanation: "Furtively = secretively.", skill: "Vocabulary: Synonym", difficulty: "easy", segment: "vocab" },
    { text: "What is the most accurate antonym for the word awkward?", options: ["Graceful", "Unwieldy", "Difficult", "Confusing"], answer: 0, explanation: "Awkward = clumsy; graceful opposite.", skill: "Vocabulary: Antonym", difficulty: "easy", segment: "vocab" },
    { text: "The general's command was absolute; when he spoke, every soldier stopped. Here, command implies:", options: ["polite request", "casual hint", "authoritative order", "friendly greeting"], answer: 2, explanation: "Command = authoritative order.", skill: "Vocabulary: Context", difficulty: "easy", segment: "vocab" },
    { text: "After spending the entire winter hiking in the snowy mountains, the explorer returned with a healthy, ______ complexion.", options: ["Solemn", "Ruddy", "Awkward", "Furtive"], answer: 1, explanation: "Ruddy = healthy reddish color.", skill: "Vocabulary: Sentence Completion", difficulty: "easy", segment: "vocab" },
    // Literature (9)
    { text: "Excerpt: 'I knew Coach Rivera was playing favorites. He nodded at Marcus...' Why question narrator's reliability?", options: ["Narrator knows all minds", "Fact-based accusation", "Conclusion from small bias", "Third-person view used"], answer: 2, explanation: "Bias: interprets nod as proof.", skill: "Literature: POV Reliability", difficulty: "medium", segment: "literature" },
    { text: "'The alarm clock was a demanding drill sergeant' is an example of:", options: ["Simile", "Metaphor", "Onomatopoeia", "Personification"], answer: 1, explanation: "Direct comparison = metaphor.", skill: "Literature: Figurative Lang", difficulty: "easy", segment: "literature" },
    { text: "Poem lines: 'The river runs beneath the stone, / While silver fish dart past the reed, / The current pulls the ice and bone, / And carries off the scattered seed.' The rhyme scheme is:", options: ["AABB", "ABAB", "Free verse", "ABBA"], answer: 1, explanation: "fall(A) reed(B) bone(A) seed(B) → ABAB.", skill: "Literature: Poetic Structure", difficulty: "medium", segment: "literature" },
    { text: "Media scene: hospital with cold blue palette, no music, stark lighting → what effect?", options: ["Warmth and safety", "Tension and dread", "Cheerful energy", "Logical appeal"], answer: 1, explanation: "Cool colors + stark = clinical dread.", skill: "Literature: Media Elements", difficulty: "medium", segment: "literature" },

    { text: "'The old floorboards groaned and complained' demonstrates:", options: ["Simile", "Metaphor", "Personification", "Onomatopoeia"], answer: 2, explanation: "Human qualities to floorboards.", skill: "Literature: Figurative Lang", difficulty: "easy", segment: "literature" },
    { text: "POV: 'He stepped into café... Her face was unreadable. What she was thinking, he could not tell.' This is:", options: ["First-person", "Third-person Limited", "Omniscient", "Second-person"], answer: 1, explanation: "Knows only his thoughts → limited.", skill: "Literature: Point of View", difficulty: "medium", segment: "literature" },
    { text: "Second poem: 'I walked / through rain. / You never / came.' is an example of:", options: ["Sonnet", "Free Verse", "Rhyme Scheme", "Formal Stanza"], answer: 1, explanation: "No regular meter/rhyme → free verse.", skill: "Literature: Poetic Mechanics", difficulty: "easy", segment: "literature" },
    { text: "The words 'sizzled' and 'popped' are examples of:", options: ["Onomatopoeia", "Metaphor", "Simile", "Personification"], answer: 0, explanation: "Words that imitate sounds.", skill: "Literature: Figurative Lang", difficulty: "easy", segment: "literature" },
    // Grammar (6)
    { text: "Which sentence correctly capitalizes a proper adjective?", options: ["french pastry", "French pastry", "French Pastry", "french Pastry"], answer: 1, explanation: "French capitalized, pastry lowercase.", skill: "Grammar: Proper Adjectives", difficulty: "easy", segment: "grammar" },
    { text: "Subject-verb agreement: The manager, along with his employees, ______ attending.", options: ["are", "is", "were", "have been"], answer: 1, explanation: "Singular 'manager' → is.", skill: "Grammar: S-V Agreement", difficulty: "medium", segment: "grammar" },
    { text: "Prepositional phrase in 'The curious cat crawled under the heavy wooden porch.'", options: ["The curious cat", "cat crawled", "under the heavy wooden porch", "crawled under heavy"], answer: 2, explanation: "'under' + object.", skill: "Grammar: Prepositional Phrases", difficulty: "easy", segment: "grammar" },

    { text: "Correct colon usage:", options: ["needs: milk", "needs three items: milk, eggs", "bought: milk", "such as: milk"], answer: 1, explanation: "Complete clause before colon.", skill: "Grammar: Punctuation", difficulty: "medium", segment: "grammar" }

  // ------------------- TEST 2 (Rewilding) - COMPLETELY REWRITTEN FOR LENGTH BALANCE -------------------
  const test2Passage = `The concept of "rewilding" has gained significant traction among modern conservationists. Unlike traditional conservation, which often seeks to preserve an ecosystem exactly as it currently is, rewilding involves restoring an area to its natural, uncultivated state. This ambitious process often includes the reintroduction of apex predators that were previously driven to local extinction by human activity. For example, the reintroduction of gray wolves to Yellowstone National Park in 1995 dramatically altered the landscape. By controlling the overpopulated elk herds, the wolves allowed overgrazed vegetation, such as willow and aspen trees, to flourish once again. This botanical resurgence subsequently stabilized riverbanks and provided new habitats for beavers and songbirds. While rewilding can yield profound ecological benefits, it frequently encounters fierce opposition from local farmers and ranchers who fear that reintroduced predators will threaten their livestock and livelihoods. Consequently, successful rewilding initiatives require delicate compromises and robust compensation programs.`;

  let test2Raw = [
    // Reading (5) - each option length ~45-55 chars
    { text: "What is the primary focus of the passage?", options: ["Wolf extinction story only", "Ranchers' economic hardship", "Rewilding methods & impacts", "Willow vs aspen tree facts"], answer: 2, explanation: "Explains process, benefits, opposition.", skill: "Reading: Main Idea", difficulty: "medium", segment: "reading" },
    { text: "If apex predators were permanently removed, what would likely happen?", options: ["Plants would overgrow fast", "Prey overpopulate & overgraze", "Riverbanks would strengthen", "Farmers would all relocate"], answer: 1, explanation: "Wolves controlled elk; without them overgrazing occurs.", skill: "Reading: Inference", difficulty: "medium", segment: "reading" },
    { text: "Which detail shows rewilding goes beyond protecting current environments?", options: ["Farmer opposition strong", "Restoring to natural state", "Controlling elk numbers", "Need for compensation"], answer: 1, explanation: "Restoring to natural state = active change.", skill: "Reading: Evidence", difficulty: "easy", segment: "reading" },
    { text: "In context, 'resurgence' most nearly means:", options: ["Permanent decline", "Renewed growth & revival", "Violent conflict", "Minor adjustment"], answer: 1, explanation: "Resurgence = revival.", skill: "Reading: Vocab in Context", difficulty: "easy", segment: "reading" },
    { text: "How does the author present the impact of gray wolves in Yellowstone?", options: ["Untested hypothesis", "Cause-and-effect chain", "Year-by-year timeline", "Purely negative event"], answer: 1, explanation: "Wolves reduce elk → vegetation flourishes → stable banks.", skill: "Reading: Text Structure", difficulty: "medium", segment: "reading" },
    // Vocabulary (10) - balanced length
    { text: "Judge declared defendant committed ______ after security footage showed physical striking.", options: ["Battery", "Element", "Prospect", "Deficiency"], answer: 0, explanation: "Battery = unlawful force.", skill: "Vocabulary: Sentence Completion", difficulty: "easy", segment: "vocab" },

  // Render function with sticky progress showing correct & incorrect counts
  function renderTest(panelId, testData, testName) {
    const panel = document.getElementById(panelId);
    panel.innerHTML = '';
    const total = testData.questions.length;
    let answered = 0, correct = 0;
    const state = { locked: new Array(total).fill(false), selected: new Array(total).fill(null) };
    
    const stickyBar = document.createElement('div');
    stickyBar.className = 'test-sticky-bar';
    stickyBar.innerHTML = `
      <div class="score-stats">
        <span>✅ <span class="score-correct" id="correct-count-${testName}">0</span></span>
        <span>❌ <span class="score-incorrect" id="incorrect-count-${testName}">0</span></span>

      </div>
      <div class="progress-wrap">

      </div>
      <div id="final-${testName}"></div>
    `;
    panel.appendChild(stickyBar);
    const container = document.createElement('div');
    panel.appendChild(container);
    
    function updateUI() {
      const pct = (answered/total)*100;
      document.getElementById(`progress-fill-${testName}`).style.width = `${pct}%`;
      document.getElementById(`answered-count-${testName}`).innerText = answered;
      document.getElementById(`correct-count-${testName}`).innerText = correct;
      document.getElementById(`incorrect-count-${testName}`).innerText = answered - correct;
      if (answered === total) {
        let finalDiv = panel.querySelector('.final-result');
        if (!finalDiv) { finalDiv = document.createElement('div'); finalDiv.className = 'final-result'; panel.appendChild(finalDiv); }
        const percent = Math.round((correct/total)*100);
        finalDiv.innerHTML = `<h3>🎉 ${testName} Complete!</h3><div style="font-size:2rem;">${correct}/${total} (${percent}%)</div><button class="retry-btn" onclick="window.retryTest('${testName}')">⟳ Retry Test</button>`;
      } else {
        const existing = panel.querySelector('.final-result');
        if(existing) existing.remove();
      }
    }
    
    const segments = [
      { name: "I. Reading Comprehension", key: "reading", passage: testData.passage },
      { name: "II. Vocabulary", key: "vocab", passage: null },
      { name: "III. Literature", key: "literature", passage: null },
      { name: "IV. Grammar", key: "grammar", passage: null }
    ];
    let globalIdx = 0;
    for (let seg of segments) {
      const segQs = testData.questions.filter(q => q.segment === seg.key);
      if (segQs.length === 0) continue;
      const header = document.createElement('div'); header.className = 'segment-header'; header.innerText = seg.name; container.appendChild(header);
      if (seg.passage) {
        const pDiv = document.createElement('div'); pDiv.className = 'passage-box'; pDiv.innerHTML = `<strong>📖 Passage:</strong><br>${seg.passage}`; container.appendChild(pDiv);
      }
      segQs.forEach((q) => {
        const idx = globalIdx++;
        const card = document.createElement('div'); card.className = 'q-card';
        card.innerHTML = `
          <div class="q-header"><span class="q-num">Q${idx+1}</span><span class="skill-badge">${q.skill}</span><span class="diff-badge diff-${q.difficulty}">${q.difficulty.toUpperCase()}</span></div>
          <div class="q-body"><div class="q-text">${q.text}</div><div class="options" id="opts-${testName}-${idx}"></div><button class="check-btn" id="check-${testName}-${idx}" disabled>Check Answer</button><div class="feedback" id="fb-${testName}-${idx}"></div></div>
        `;
        container.appendChild(card);
        const optsDiv = card.querySelector('.options');
        q.options.forEach((opt, oi) => {
          const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = `${String.fromCharCode(65+oi)}. ${opt}`;
          btn.addEventListener('click', () => {
            if (state.locked[idx]) return;
            optsDiv.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            state.selected[idx] = oi;
            document.getElementById(`check-${testName}-${idx}`).disabled = false;
          });
          optsDiv.appendChild(btn);
        });
        const checkBtn = card.querySelector('.check-btn');
        checkBtn.addEventListener('click', () => {
          if (state.locked[idx]) return;
          const selected = state.selected[idx];
          if (selected === undefined) return;
          const isCorrect = (selected === q.answer);
          state.locked[idx] = true; answered++; if(isCorrect) correct++;
          updateUI();
          const opts = optsDiv.querySelectorAll('.option-btn');
          opts.forEach(b => b.disabled = true);
          opts[q.answer].classList.add('correct');
          if(!isCorrect) opts[selected].classList.add('incorrect');
          const fbDiv = card.querySelector('.feedback');
          fbDiv.style.display = 'block';
          fbDiv.className = `feedback ${isCorrect?'correct':'incorrect'}`;
          fbDiv.innerHTML = isCorrect ? `✅ ${q.explanation}` : `❌ Correct: ${q.options[q.answer]}. ${q.explanation}`;
          checkBtn.disabled = true;
        });
      });
    }
    updateUI();
    window[`retryTest_${testName}`] = () => renderTest(panelId, testData, testName);
  }

      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`${testId}-panel`).classList.add('active');
    });
  });
  
  // Initial render
  renderTest('test1-panel', tests.test1, 'Test1');
  renderTest('test2-panel', tests.test2, 'Test2');
  renderTest('test3-panel', tests.test3, 'Test3');
  renderTest('test4-panel', tests.test4, 'Test4');
</script>
